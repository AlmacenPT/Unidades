<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registro de Rutas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    font-family: Arial;
    margin:20px;
}
input,button{
    padding:6px;
    margin:5px;
}
table{
    border-collapse: collapse;
    margin-top:20px;
    width:auto;
}
th,td{
    border:1px solid #ccc;
    padding:6px 10px;
    text-align:left;
    white-space:nowrap;
}
th{
    background:#f0f0f0;
}
.btn-eliminar{
    background:#e74c3c;
    color:white;
    border:none;
    padding:4px 8px;
    border-radius:4px;
    cursor:pointer;
}
.btn-fotos{
    background:#3498db;
    color:white;
    border:none;
    padding:4px 8px;
    border-radius:4px;
    cursor:pointer;
}
</style>

</head>

<body>

<h3>Registro de Ruta + Placa</h3>

Fecha
<input type="date" id="fecha">

Ruta
<input type="text" id="ruta">

Placa
<input type="text" id="placa">

<button onclick="guardar()">Registrar</button>

<table id="tabla">
<thead>
<tr>
<th>N°</th>
<th>Fecha</th>
<th>Ruta</th>
<th>Placa</th>
<th>Fotos</th>
<th>Ir Fotos</th>
<th>Acción</th>
</tr>
</thead>

<tbody></tbody>

</table>


<script>

const clienteSupabase = window.supabase.createClient(
"https://hwjhemjgyducdnxbahak.supabase.co",
"sb_publishable_vDgKuupqEqGzLe8Eot0JVg_osYFTOMn"
)

// FECHA HOY
const hoy = new Date().toISOString().split("T")[0]
document.getElementById("fecha").value = hoy

cargarRegistros()
document.getElementById("fecha").addEventListener("change",cargarRegistros)


// GUARDAR
async function guardar(){

    let fecha = document.getElementById("fecha").value
    let ruta = document.getElementById("ruta").value
    let placa = document.getElementById("placa").value.toUpperCase()

    if(!ruta || !placa){
        alert("Complete ruta y placa")
        return
    }

    const {data:existente} = await clienteSupabase
        .from("rutas")
        .select("*")
        .eq("fecha",fecha)
        .eq("placa",placa)

    if(existente.length>0){
        alert("Esta placa ya fue registrada hoy")
        return
    }

    const {error} = await clienteSupabase
        .from("rutas")
        .insert([{fecha,ruta,placa}])

    if(error){
        alert("Error al guardar")
        console.log(error)
        return
    }

    document.getElementById("ruta").value=""
    document.getElementById("placa").value=""

    cargarRegistros()
}



// CARGAR REGISTROS
async function cargarRegistros(){

    let fecha = document.getElementById("fecha").value

    const {data,error} = await clienteSupabase
        .from("vista_rutas_con_fotos")
        .select("*")
        .eq("fecha",fecha)
        .order("id",{ascending:true})

    if(error){
        console.log(error)
        return
    }

    let tbody = document.querySelector("#tabla tbody")
    tbody.innerHTML=""

    let contador = 1

    for(const reg of data){

        let fila = `
        <tr>
            <td>${contador}</td>
            <td>${reg.fecha}</td>
            <td>${reg.ruta}</td>
            <td>${reg.placa}</td>
            <td>${reg.fotos || 0}</td>
            <td>
                <button class="btn-fotos" onclick="abrirFotos('${reg.placa}','${reg.fecha}')">📷 Fotos</button>
            </td>
            <td>
                <button class="btn-eliminar" onclick="eliminar(${reg.id})">Eliminar</button>
            </td>
        </tr>
        `

        tbody.innerHTML += fila
        contador++
    }

}


// ABRIR PAGINA FOTOS
function abrirFotos(placa,fecha){

    window.location = `fotos.html?placa=${placa}&fecha=${fecha}`

}


// ELIMINAR
async function eliminar(id){

    if(!confirm("¿Eliminar registro?")) return

    const {error} = await clienteSupabase
        .from("rutas")
        .delete()
        .eq("id",id)

    if(error){
        alert("Error al eliminar")
        console.log(error)
        return
    }

    cargarRegistros()
}

</script>

</body>
</html>
