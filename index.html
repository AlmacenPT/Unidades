<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

}

padding:6px;

}

<body>

<h3>Registro de Ruta + Placa</h3>

Fecha

Ruta

Placa
<input type="text" id="placa">

<button onclick="guardar()">Registrar</button>

<br><br>

Ruta reporte
<select id="rutaReporte">
<option value="">Todas</option>
</select>

<button onclick="generarReporte()">Generar Reporte PDF</button>

<button onclick="activarAdmin()">Modo Admin</button>

<table id="tabla">
<thead>
<tr>
<th>N°</th>
<th>Fecha</th>
<th>Ruta</th>
<th>Placa</th>
<th>Fotos</th>
<th>Ir Fotos</th>
<th id="colPrecintos" style="display:none;">Precintos</th>
<th id="colIrPrecintos" style="display:none;">Ir Precintos</th>
<th id="colAccion" style="display:none;">Acción</th>
</tr>
</thead>

<tbody></tbody>

</table>


<script>
	let modoAdmin = false

const clienteSupabase = window.supabase.createClient(
"https://hwjhemjgyducdnxbahak.supabase.co",
"sb_publishable_vDgKuupqEqGzLe8Eot0JVg_osYFTOMn"
)

// FECHA HOY
function fechaPeru(){

const ahora = new Date()

const peru = new Date(
ahora.toLocaleString("en-US",{timeZone:"America/Lima"})
)

const yyyy = peru.getFullYear()
const mm = String(peru.getMonth()+1).padStart(2,'0')
const dd = String(peru.getDate()).padStart(2,'0')

return `${yyyy}-${mm}-${dd}`

}

let fechaGuardada = localStorage.getItem("fechaSeleccionada")

if(fechaGuardada){
document.getElementById("fecha").value = fechaGuardada
}else{
document.getElementById("fecha").value = fechaPeru()
}

cargarRegistros()

document.getElementById("fecha").addEventListener("change",cargarRegistros)

// GUARDAR
async function guardar(){

    let fecha = document.getElementById("fecha").value
    let ruta = document.getElementById("ruta").value
    let placa = document.getElementById("placa").value.toUpperCase()

    if(!ruta || !placa){
        alert("Complete ruta y placa")
        return
    }

    const {data:existente} = await clienteSupabase
        .from("rutas")
        .select("*")
        .eq("fecha",fecha)
        .eq("placa",placa)

    if(existente.length>0){
        alert("Esta placa ya fue registrada hoy")
        return
    }

    const {error} = await clienteSupabase
        .from("rutas")
        .insert([{fecha,ruta,placa}])

    if(error){
        alert("Error al guardar")
        console.log(error)
        return
    }

    document.getElementById("ruta").value=""
    document.getElementById("placa").value=""

    cargarRegistros()
}



// CARGAR REGISTROS
async function cargarRegistros(){

    let fecha = document.getElementById("fecha").value

    const {data,error} = await clienteSupabase
        .from("vista_rutas_con_fotos")
        .select("*")
        .eq("fecha",fecha)
        .order("id",{ascending:true})

    if(error){
        console.log(error)
        return
    }

    let tbody = document.querySelector("#tabla tbody")
    tbody.innerHTML=""

    let contador = 1

    for(const reg of data){

        let fila = `
        <tr>
            <td>${contador}</td>
            <td>${reg.fecha}</td>
            <td>${reg.ruta}</td>
            <td>${reg.placa}</td>
            <td>${reg.fotos || 0}</td>
            <td>
                <button class="btn-fotos" onclick="abrirFotos('${reg.placa}','${reg.fecha}')">📷 Fotos</button>
            </td>

${modoAdmin ? `
<td>${reg.precintos || 0}</td>

<td>
<button onclick="abrirPrecintos('${reg.placa}','${reg.fecha}')">
📋 Precintos
</button>
</td>
` : ``}

            ${modoAdmin ? `
<td>
<button class="btn-eliminar" onclick="eliminar(${reg.id})">Eliminar</button>
</td>
` : ``}
        </tr>
        `

        tbody.innerHTML += fila
        contador++
    }
cargarRutas()
}

async function cargarRutas(){

const fecha = document.getElementById("fecha").value

const {data} = await clienteSupabase
.from("rutas")
.select("ruta")
.eq("fecha",fecha)

const rutasUnicas = [...new Set(data.map(r => r.ruta))]

const selector = document.getElementById("rutaReporte")

selector.innerHTML = '<option value="">Todas</option>'

rutasUnicas.forEach(ruta =>{

selector.innerHTML += `<option value="${ruta}">${ruta}</option>`

})

}

// ABRIR PAGINA FOTOS
function abrirFotos(placa,fecha){

    localStorage.setItem("fechaSeleccionada",fecha)

    window.location = `fotos.html?placa=${placa}&fecha=${fecha}`

}

// ABRIR PAGINA PRECINTOS
function abrirPrecintos(placa,fecha){

window.location =
`precintos.html?placa=${placa}&fecha=${fecha}`

}

// ELIMINAR
async function eliminar(id){

    if(!confirm("¿Eliminar registro?")) return

    const {error} = await clienteSupabase
        .from("rutas")
        .delete()
        .eq("id",id)

    if(error){
        alert("Error al eliminar")
        console.log(error)
        return
    }

    cargarRegistros()
}

//GENERAR REPORTE PDF (4 FOTOS POR HOJA - DATOS ARRIBA)
async function generarReporte(){

const { jsPDF } = window.jspdf

const doc = new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a4"
})

const fecha = document.getElementById("fecha").value
const rutaFiltro = document.getElementById("rutaReporte").value

/* CONSULTAR RUTAS */

let query = clienteSupabase
.from("rutas")
.select("*")
.eq("fecha",fecha)

if(rutaFiltro){
query = query.eq("ruta",rutaFiltro)
}

const { data:rutas } = await query

if(!rutas || rutas.length===0){
alert("No hay datos")
return
}

/* PAGINA 1 : TABLA UNIDADES */

doc.setFontSize(16)
doc.text("Listado de Unidades",10,10)

doc.setFontSize(11)

let y = 25

// encabezado
doc.rect(10,y-6,15,8)
doc.rect(25,y-6,35,8)
doc.rect(60,y-6,70,8)
doc.rect(130,y-6,40,8)

doc.text("N°",12,y)
doc.text("Fecha",27,y)
doc.text("Ruta",62,y)
doc.text("Placa",132,y)

y += 8

rutas.forEach((r,i)=>{

let rutaTexto = doc.splitTextToSize(String(r.ruta),65)

let alturaFila = rutaTexto.length * 6

if(alturaFila < 8){
alturaFila = 8
}

// dibujar celdas
doc.rect(10,y-6,15,alturaFila)
doc.rect(25,y-6,35,alturaFila)
doc.rect(60,y-6,70,alturaFila)
doc.rect(130,y-6,40,alturaFila)

// escribir texto
doc.text(String(i+1),12,y)
doc.text(String(r.fecha),27,y)
doc.text(rutaTexto,62,y)
doc.text(String(r.placa),132,y)

y += alturaFila

if(y>270){
doc.addPage()
y=20
}

})

/* OBTENER PRECINTOS */

const placas = rutas.map(r=>r.placa)

const { data:precintos } = await clienteSupabase
.from("precintos")
.select("*")
.in("placa",placas)
.eq("fecha",fecha)

/* PAGINA 2 : TABLA PRECINTOS */

doc.addPage()

doc.setFontSize(16)
doc.text("Listado de Precintos",10,10)

doc.setFontSize(11)

let y2 = 25

// encabezado
doc.rect(10,y2-6,15,8)
doc.rect(25,y2-6,30,8)
doc.rect(55,y2-6,30,8)
doc.rect(85,y2-6,30,8)
doc.rect(115,y2-6,30,8)
doc.rect(145,y2-6,30,8)

doc.text("N°",12,y2)
doc.text("Placa",27,y2)
doc.text("Prec. Verde",57,y2)
doc.text("Prec. Blanco",87,y2)
doc.text("Crotal",117,y2)
doc.text("Lote",147,y2)

y2 += 8

if(precintos){

precintos.forEach((p,i)=>{

doc.rect(10,y2-6,15,8)
doc.rect(25,y2-6,30,8)
doc.rect(55,y2-6,30,8)
doc.rect(85,y2-6,30,8)
doc.rect(115,y2-6,30,8)
doc.rect(145,y2-6,30,8)

doc.text(String(i+1),12,y2)
doc.text(String(p.placa),27,y2)
doc.text(String(p.precinto_1_verde),57,y2)
doc.text(String(p.precinto_2_blanco),87,y2)
doc.text(String(p.crotal),117,y2)
doc.text(String(p.lote),147,y2)

y2 += 8

if(y2>280){
doc.addPage()
y2=20
}

})

}

/* PAGINAS DE FOTOS (SIN CAMBIOS) */

for(const r of rutas){

doc.addPage()

doc.setFontSize(16)
doc.text("Reporte de Unidades",10,10)

doc.setFontSize(11)

doc.text(`Fecha: ${r.fecha}    Ruta: ${r.ruta}    Placa: ${r.placa}`,10,20)

let posiciones = [
{ x:10 , y:30 },
{ x:105, y:30 },
{ x:10 , y:160 },
{ x:105, y:160 }
]

const { data:fotos } = await clienteSupabase
.from("fotos")
.select("*")
.eq("placa",r.placa)
.eq("fecha",r.fecha)

let indice = 0

for(const f of fotos){

if(indice >= 4) break

const pos = posiciones[indice]

const img = await cargarImagen(f.url)

await agregarImagenAuto(doc,img,pos.x,pos.y,90,110)

indice++

}

}

doc.save("reporte_rutas.pdf")

}


function cargarImagen(url){

return new Promise(resolve=>{

const img = new Image()
img.crossOrigin = "anonymous"

img.onload = function(){

const canvas = document.createElement("canvas")
canvas.width = img.width
canvas.height = img.height

const ctx = canvas.getContext("2d")
ctx.drawImage(img,0,0)

resolve(canvas.toDataURL("image/jpeg"))

}

img.src = url

})

}

function agregarImagenAuto(doc,imgData,x,y,maxAncho,maxAlto){

return new Promise(resolve=>{

const img = new Image()

img.onload=function(){

let ancho = img.width
let alto = img.height

const ratio = Math.min(maxAncho/ancho, maxAlto/alto)

ancho *= ratio
alto *= ratio

doc.addImage(imgData,'JPEG',x,y,ancho,alto)

resolve(alto)

}

img.src = imgData

})

}

document.addEventListener("visibilitychange", function(){

    if(document.visibilityState === "visible"){
        cargarRegistros()
    }

})

function activarAdmin(){

const clave = prompt("Ingrese clave de administrador")

if(clave === "1234"){

modoAdmin = true

document.getElementById("colAccion").style.display=""
document.getElementById("colPrecintos").style.display=""
document.getElementById("colIrPrecintos").style.display=""

alert("Modo administrador activado")

cargarRegistros()

}else{

alert("Clave incorrecta")

}

}

</script>
