<head>

<th>Ruta</th>

<th>Fotos</th>
<th>Ir Fotos</th>
<th id="colAccion" style="display:none;">Acción</th>
</tr>
</thead>

<tbody></tbody>

</table>


<script>
	let modoAdmin = false

const clienteSupabase = window.supabase.createClient(
"https://hwjhemjgyducdnxbahak.supabase.co",
"sb_publishable_vDgKuupqEqGzLe8Eot0JVg_osYFTOMn"
)

// FECHA HOY

)

const yyyy = peru.getFullYear()
const mm = String(peru.getMonth()+1).padStart(2,'0')

let fechaGuardada = localStorage.getItem("fechaSeleccionada")

if(fechaGuardada){
document.getElementById("fecha").value = fechaGuardada
}else{
document.getElementById("fecha").value = fechaPeru()
}

cargarRegistros()

document.getElementById("fecha").addEventListener("change",cargarRegistros)

// GUARDAR
async function guardar(){

    let fecha = document.getElementById("fecha").value
    let ruta = document.getElementById("ruta").value
    let placa = document.getElementById("placa").value.toUpperCase()

    if(!ruta || !placa){
        alert("Complete ruta y placa")
        return
    }

    const {data:existente} = await clienteSupabase
        .from("rutas")
        .select("*")
        .eq("fecha",fecha)
        .eq("placa",placa)

    if(existente.length>0){
        alert("Esta placa ya fue registrada hoy")
        return
    }

    const {error} = await clienteSupabase
        .from("rutas")
        .insert([{fecha,ruta,placa}])

    if(error){
        alert("Error al guardar")
        console.log(error)
        return
    }

    document.getElementById("ruta").value=""
    document.getElementById("placa").value=""

    cargarRegistros()
}



// CARGAR REGISTROS
async function cargarRegistros(){

    let fecha = document.getElementById("fecha").value

    const {data,error} = await clienteSupabase
        .from("vista_rutas_con_fotos")
        .select("*")
        .eq("fecha",fecha)
        .order("id",{ascending:true})

    if(error){
        console.log(error)
        return
    }

    let tbody = document.querySelector("#tabla tbody")
    tbody.innerHTML=""

    let contador = 1

    for(const reg of data){

        let fila = `
        <tr>
            <td>${contador}</td>
            <td>${reg.fecha}</td>
            <td>${reg.ruta}</td>
            <td>${reg.placa}</td>
            <td>${reg.fotos || 0}</td>
            <td>
                <button class="btn-fotos" onclick="abrirFotos('${reg.placa}','${reg.fecha}')">📷 Fotos</button>
            </td>
            ${modoAdmin ? `
<td>
<button class="btn-eliminar" onclick="eliminar(${reg.id})">Eliminar</button>
</td>
` : ``}
        </tr>
        `

        tbody.innerHTML += fila
        contador++
    }
cargarRutas()
}

async function cargarRutas(){

const fecha = document.getElementById("fecha").value

const {data} = await clienteSupabase
.from("rutas")
.select("ruta")
.eq("fecha",fecha)

const rutasUnicas = [...new Set(data.map(r => r.ruta))]

const selector = document.getElementById("rutaReporte")

selector.innerHTML = '<option value="">Todas</option>'

rutasUnicas.forEach(ruta =>{

selector.innerHTML += `<option value="${ruta}">${ruta}</option>`

})

}

// ABRIR PAGINA FOTOS
function abrirFotos(placa,fecha){

    localStorage.setItem("fechaSeleccionada",fecha)

    window.location = `fotos.html?placa=${placa}&fecha=${fecha}`

}

// ELIMINAR
async function eliminar(id){

    if(!confirm("¿Eliminar registro?")) return

    const {error} = await clienteSupabase
        .from("rutas")
        .delete()
        .eq("id",id)

    if(error){
        alert("Error al eliminar")
        console.log(error)
        return
    }

    cargarRegistros()
}

//GENERAR REPORTE PDF (4 FOTOS POR HOJA - DATOS ARRIBA)
async function generarReporte(){

const { jsPDF } = window.jspdf

const doc = new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a4"
})

const fecha = document.getElementById("fecha").value

// obtener rutas del día
const rutaFiltro = document.getElementById("rutaReporte").value

let query = clienteSupabase
.from("rutas")
.select("*")
.eq("fecha",fecha)

if(rutaFiltro){
query = query.eq("ruta",rutaFiltro)
}

const { data:rutas } = await query

let primeraPagina = true

for(const r of rutas){

if(!primeraPagina){
doc.addPage()
}

primeraPagina = false

doc.setFontSize(16)
doc.text("Reporte de Unidades",10,10)

doc.setFontSize(11)

// DATOS EN UNA SOLA LINEA
doc.text(`Fecha: ${r.fecha}    Ruta: ${r.ruta}    Placa: ${r.placa}`,10,20)


// posiciones de las 4 fotos
let posiciones = [
{ x:10 , y:30 },
{ x:105, y:30 },
{ x:10 , y:160 },
{ x:105, y:160 }
]


// obtener fotos
const { data:fotos } = await clienteSupabase
.from("fotos")
.select("*")
.eq("placa",r.placa)
.eq("fecha",r.fecha)

let indice = 0

for(const f of fotos){

if(indice >= 4) break

const pos = posiciones[indice]

const img = await cargarImagen(f.url)

// FOTO GRANDE
await agregarImagenAuto(doc,img,pos.x,pos.y,90,110)

indice++

}

}

doc.save("reporte_rutas.pdf")

}

function cargarImagen(url){

return new Promise(resolve=>{

const img = new Image()
img.crossOrigin = "anonymous"

img.onload = function(){

const canvas = document.createElement("canvas")
canvas.width = img.width
canvas.height = img.height

const ctx = canvas.getContext("2d")
ctx.drawImage(img,0,0)

resolve(canvas.toDataURL("image/jpeg"))

}

img.src = url

})

}

function agregarImagenAuto(doc,imgData,x,y,maxAncho,maxAlto){

return new Promise(resolve=>{

const img = new Image()

img.onload=function(){

let ancho = img.width
let alto = img.height

const ratio = Math.min(maxAncho/ancho, maxAlto/alto)

ancho *= ratio
alto *= ratio

doc.addImage(imgData,'JPEG',x,y,ancho,alto)

resolve(alto)

}

img.src = imgData

})

}

document.addEventListener("visibilitychange", function(){

    if(document.visibilityState === "visible"){
        cargarRegistros()
    }

})

function activarAdmin(){

const clave = prompt("Ingrese clave de administrador")

if(clave === "1234"){

modoAdmin = true

document.getElementById("colAccion").style.display=""

alert("Modo administrador activado")

cargarRegistros()

}else{

alert("Clave incorrecta")

}

}
