<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Registro Fotos Vehículos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial;
    padding:20px;
    background:#f5f5f5;
}

h3{
    margin-bottom:10px;
}

input,button{
    padding:10px;
    margin:5px;
    font-size:14px;
}

button{
    background:#3498db;
    color:white;
    border:none;
    border-radius:5px;
}

button:disabled{
    background:#95a5a6;
}

.galeria{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:20px;
}

.card{
    position:relative;
    background:white;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    display:block;
}

.btn-eliminar{
    position:absolute;
    top:5px;
    right:5px;
    background:#e74c3c;
    color:white;
    border:none;
    padding:5px 8px;
    border-radius:4px;
    cursor:pointer;
}

#contador{
    font-weight:bold;
    margin-top:10px;
}

</style>

</head>

<body>

<h3>Registro de Fotos Vehículo</h3>

<label>Placa</label>
<input id="placa" readonly>

<label>Fecha</label>
<input id="fecha" type="date" readonly>

<br>

<input id="foto" type="file" accept="image/*" capture="environment">

<button id="btnSubir" onclick="subir()">Subir Foto</button>

<p id="contador">Fotos: 0 / 4</p>

<div class="galeria" id="galeria"></div>


<script>

const supabaseUrl = "https://hwjhemjgyducdnxbahak.supabase.co"
const supabaseKey = "sb_publishable_vDgKuupqEqGzLe8Eot0JVg_osYFTOMn"

const clienteSupabase = supabase.createClient(supabaseUrl, supabaseKey)

let totalFotos = 0


// RECIBIR PARAMETROS URL

const params = new URLSearchParams(window.location.search)

const placaURL = params.get("placa")
const fechaURL = params.get("fecha")

document.getElementById("placa").value = placaURL
document.getElementById("fecha").value = fechaURL


buscar()


// CARGAR FOTOS

async function buscar(){

    const placa = document.getElementById("placa").value
    const fecha = document.getElementById("fecha").value

    const { data } = await clienteSupabase
        .from("fotos")
        .select("*")
        .eq("placa",placa)
        .eq("fecha",fecha)

    const galeria = document.getElementById("galeria")
    galeria.innerHTML=""

    totalFotos = data.length

    document.getElementById("contador").innerText =
        "Fotos: "+totalFotos+" / 4"

    data.forEach(f => {

        galeria.innerHTML += `

        <div class="card">

            <img src="${f.url}">

            <button class="btn-eliminar"
            onclick="eliminarFoto('${f.id}','${f.url}')">
            X
            </button>

        </div>

        `
    })
}


// SUBIR FOTO

async function subir(){

    if(totalFotos >= 4){
        alert("Máximo 4 fotos")
        return
    }

    const input = document.getElementById("foto")
    const file = input.files[0]

    if(!file){
        alert("Seleccione una foto")
        return
    }

    const btn = document.getElementById("btnSubir")

    btn.disabled=true
    btn.innerText="Subiendo..."


    // REDIMENSIONAR

    const img = new Image()
    const reader = new FileReader()

    reader.onload=e=>img.src=e.target.result
    reader.readAsDataURL(file)

    await new Promise(r=>img.onload=r)

    const canvas=document.createElement("canvas")

    const max=800

    let w=img.width
    let h=img.height

    if(w>h){
        if(w>max){
            h=h*(max/w)
            w=max
        }
    }else{
        if(h>max){
            w=w*(max/h)
            h=max
        }
    }

    canvas.width=w
    canvas.height=h

    const ctx=canvas.getContext("2d")

    ctx.drawImage(img,0,0,w,h)

    const blob=await new Promise(r=>canvas.toBlob(r,"image/jpeg",0.7))


    const nombre=Date.now()+".jpg"


    // SUBIR STORAGE

    const {error}=await clienteSupabase
        .storage
        .from("imagenes")
        .upload(nombre,blob)

    if(error){
        alert("Error subiendo imagen")
        btn.disabled=false
        btn.innerText="Subir Foto"
        return
    }


    const {data:urlData}=clienteSupabase
        .storage
        .from("imagenes")
        .getPublicUrl(nombre)

    const url=urlData.publicUrl


    // GUARDAR BD

    await clienteSupabase
        .from("fotos")
        .insert([{
            placa:placaURL,
            fecha:fechaURL,
            url:url
        }])

    input.value=""

    btn.disabled=false
    btn.innerText="Subir Foto"

    buscar()

}


// ELIMINAR FOTO

async function eliminarFoto(id,url){

    if(!confirm("¿Eliminar foto?")) return

    const nombre=url.split("/").pop()

    await clienteSupabase
        .storage
        .from("imagenes")
        .remove([nombre])

    await clienteSupabase
        .from("fotos")
        .delete()
        .eq("id",id)

    buscar()

}

</script>

</body>
</html>
